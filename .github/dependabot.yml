version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuxt-stack:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "nitropack"
          - "h3"
          - "vite"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
