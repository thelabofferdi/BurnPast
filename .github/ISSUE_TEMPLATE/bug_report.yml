name: Bug report
description: Report a reproducible BurnPaste issue
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real secrets, tokens, passwords, private keys, or production data.
        For vulnerabilities, follow SECURITY.md instead of posting exploit details publicly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web app
        - API
        - CLI
        - Storage
        - Deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Use demo data only.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Node:
        Browser:
        OS:
        Deployment:
