name: Feature request
description: Suggest an improvement for BurnPaste
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or risk should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should BurnPaste do differently?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web app
        - API
        - CLI
        - Storage
        - Deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: Include privacy, abuse, storage, or crypto tradeoffs if relevant.
