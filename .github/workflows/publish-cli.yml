name: Publish CLI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish burnpast to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish CLI
        run: npm publish --workspace burnpast --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
